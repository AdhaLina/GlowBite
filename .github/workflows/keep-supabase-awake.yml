# Keeps the GlowBite Supabase project from pausing on the free tier.
# Sends a tiny read request every 2 days — that counts as database
# activity, which resets Supabase's 7-day inactivity pause timer.
# Runs on GitHub's free Actions minutes; independent of Claude.
name: Keep Supabase awake

on:
  schedule:
    - cron: "0 6 */2 * *"   # 06:00 UTC, every 2 days
  workflow_dispatch:          # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            "https://gbiinonyapnsnjcesedn.supabase.co/rest/v1/glow_data?select=user_id&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiaWlub255YXBuc25qY2VzZWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTE0OTksImV4cCI6MjA5ODY2NzQ5OX0.Ma1lvSCsI4vbqRGJrZFoWh0Xz8gvDcWtthlLvWCWqnQ"
