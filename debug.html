<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GlowBite Sign-in Test</title>
<style>
body{font-family:system-ui,sans-serif;background:#12081a;color:#fff;padding:1.2rem;line-height:1.5;margin:0}
h1{font-size:1.2rem}
button{font-size:1rem;font-weight:700;padding:.9rem 1.4rem;border-radius:12px;border:none;background:#7B2FF7;color:#fff;margin:.8rem 0;width:100%;cursor:pointer}
.box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:.8rem 1rem;margin:.6rem 0;word-break:break-all;font-size:.85rem}
.ok{color:#7CFF6B}.bad{color:#FF8A8A}.k{color:#FFD166;font-weight:700}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<h1>🔍 GlowBite Sign-in Test</h1>
<button onclick="go()">1️⃣ Test Google sign-in</button>
<div id="out"></div>
<script>
const SUPA_URL='https://gbiinonyapnsnjcesedn.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdiaWlub255YXBuc25qY2VzZWRuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTE0OTksImV4cCI6MjA5ODY2NzQ5OX0.Ma1lvSCsI4vbqRGJrZFoWh0Xz8gvDcWtthlLvWCWqnQ';
const out=document.getElementById('out');
function row(k,v,cls){out.innerHTML+=`<div class="box"><span class="k">${k}</span><br><span class="${cls||''}">${v}</span></div>`;}
function go(){
  location.href=SUPA_URL+'/auth/v1/authorize?provider=google&redirect_to='+encodeURIComponent(location.origin+location.pathname);
}
(async function(){
  row('Page URL length',String(location.href.length));
  const h=new URLSearchParams((location.hash||'').replace(/^#/,''));
  const q=new URLSearchParams(location.search);
  const at=h.get('access_token'),rt=h.get('refresh_token');
  const err=h.get('error_description')||h.get('error')||q.get('error_description')||q.get('error');
  const code=q.get('code');
  row('access_token in URL', at?('YES ✅ ('+at.slice(0,12)+'…)'):'NO ❌', at?'ok':'bad');
  row('refresh_token in URL', rt?'YES ✅':'NO ❌', rt?'ok':'bad');
  row('?code= in URL (PKCE)', code?('YES ('+code.slice(0,8)+'…)'):'no', code?'ok':'');
  row('OAuth error', err?decodeURIComponent(err.replace(/\+/g,' ')):'none', err?'bad':'ok');
  if(!window.supabase){row('Supabase library','FAILED TO LOAD ❌','bad');return;}
  const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
  if(at&&rt){
    const{data,error}=await sb.auth.setSession({access_token:at,refresh_token:rt});
    row('setSession result', error?('ERROR: '+error.message):('OK ✅ signed in as '+(data.session?.user?.email||'?')), error?'bad':'ok');
  }
  const{data:{session}}=await sb.auth.getSession();
  row('Current session', session?('ACTIVE ✅ '+session.user.email):'none', session?'ok':'bad');
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');row('localStorage','works ✅','ok');}
  catch(e){row('localStorage','BLOCKED ❌ '+e.message,'bad');}
})();
</script>
</body>
</html>
